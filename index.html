<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小五溫習挑戰 ⏱️ 準備迎戰！</title>
    <style>
        /* 遊戲風格的字體與背景 */
        body {
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            background-color: #2f3640;
            color: #f5f6fa;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #fbc531;
            text-shadow: 2px 2px #e1b12c;
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        #timers-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 炸彈卡片設計 */
        .timer-card {
            background-color: #353b48;
            border: 5px solid #e84118;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            padding: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 0 #c23616;
            transition: transform 0.2s;
        }

        .timer-card:hover {
            transform: translateY(-5px);
        }

        /* 跳動的炸彈 */
        .bomb-icon {
            font-size: 50px;
            margin-right: 20px;
            animation: pulse 1s infinite alternate;
        }

        .content {
            text-align: left;
            flex-grow: 1;
        }

        .title {
            font-size: 1.5em;
            font-weight: bold;
            color: #fbc531;
            margin-bottom: 5px;
        }

        .date-text {
            font-size: 1em;
            color: #dcdde1;
            margin-bottom: 10px;
        }

        /* 倒數計時數字樣式 */
        .countdown {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.6em;
            font-weight: bold;
            color: #4cd137;
            background: #222f3e;
            padding: 10px 15px;
            border-radius: 10px;
            display: inline-block;
            border: 2px solid #4cd137;
        }

        /* 緊急狀態（少於3天）的樣式 */
        .urgent .countdown {
            color: #e84118;
            border-color: #e84118;
            animation: flash 1s infinite alternate;
        }

        /* 動畫設定 */
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15) rotate(-10deg); }
        }

        @keyframes flash {
            0% { background: #222f3e; }
            100% { background: #4a1c1c; }
        }
        
        /* 手機版適應 */
        @media (max-width: 600px) {
            .timer-card { flex-direction: column; text-align: center; }
            .bomb-icon { margin: 0 0 10px 0; }
            .content { text-align: center; }
        }
    </style>
</head>
<body>

    <h1>💣 小五溫習大挑戰 ⏱️</h1>
    <p>任務即將到期，請把握時間解除炸彈！</p>
    
    <div id="timers-container">
        </div>

    <script>
        // 設定默書與測驗的資料
        // 設定時間為早上 8:00 (學校開始時間)
        const tasks = [
            { title: "5下中默二", dateStr: "2026年3月11日(三)", targetTime: new Date("2026-03-11T08:00:00").getTime() },
            { title: "5下英默二", dateStr: "2026年3月12日(四)", targetTime: new Date("2026-03-12T08:00:00").getTime() },
            // 已更新：5下數進評日期改為3月4日
            { title: "5下數進評 (圓的認識、繪畫圓形)", dateStr: "2026年3月4日(四)", targetTime: new Date("2026-03-04T08:00:00").getTime() },
            { title: "5下常進評 (第五冊1、2課 中國的地理、氣候)", dateStr: "2026年3月5日(四)", targetTime: new Date("2026-03-05T08:00:00").getTime() }
        ];

        // 依照日期先後自動排序，最急的排最上面
        tasks.sort((a, b) => a.targetTime - b.targetTime);

        const container = document.getElementById("timers-container");

        // 產生卡片 HTML (已移除沙漏)
        tasks.forEach((task, index) => {
            const card = document.createElement("div");
            card.className = "timer-card";
            card.id = `card-${index}`;
            
            card.innerHTML = `
                <div class="bomb-icon">💣</div>
                <div class="content">
                    <div class="title">${task.title}</div>
                    <div class="date-text">作戰日期：${task.dateStr}</div>
                    <div class="countdown" id="countdown-${index}">計算中...</div>
                </div>
            `;
            container.appendChild(card);
        });

        // 每秒更新倒數計時
        setInterval(() => {
            const now = new Date().getTime();

            tasks.forEach((task, index) => {
                const distance = task.targetTime - now;
                const countdownEl = document.getElementById(`countdown-${index}`);
                const cardEl = document.getElementById(`card-${index}`);

                if (distance < 0) {
                    countdownEl.innerHTML = "🎉 任務已結束！";
                    countdownEl.style.color = "#7f8fa6";
                    countdownEl.style.borderColor = "#7f8fa6";
                    cardEl.style.opacity = "0.6";
                    return;
                }

                // 計算日、時、分、秒
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                countdownEl.innerHTML = `剩餘：${days}日 ${hours}時 ${minutes}分 ${seconds}秒`;

                // 如果剩餘時間少於 3 天，加上 'urgent' 類別（字體變紅、閃爍警告）
                if (days < 3) {
                    cardEl.classList.add("urgent");
                } else {
                    cardEl.classList.remove("urgent");
                }
            });
        }, 1000);
    </script>
</body>
</html>
